<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Klaus Lila</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#141414;--amber:#EF9F27;--amber-d:#D4882A;--teal:#1D9E75;--txt:#E8E8E8;--txt2:rgba(232,232,232,0.4);--txt3:rgba(232,232,232,0.35)}
html{scroll-behavior:smooth}
body{background:var(--bg);min-height:100vh;font-family:'DM Sans',-apple-system,sans-serif;color:var(--txt);overflow-x:hidden}
@keyframes glow{0%,100%{opacity:0.12}50%{opacity:0.2}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.wrapper{max-width:960px;margin:0 auto;padding:0 32px;position:relative}
.section{padding:100px 0;position:relative;z-index:1}
.divider{max-width:800px;margin:0 auto;height:1px;background:linear-gradient(to right,transparent,var(--teal),var(--amber),transparent);opacity:0.2;position:relative;z-index:1}
.lg{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);border:1px solid rgba(255,255,255,0.12);border-radius:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1),0 8px 32px rgba(0,0,0,0.3)}
.lg-card{background:linear-gradient(160deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));backdrop-filter:blur(30px) saturate(1.3);-webkit-backdrop-filter:blur(30px) saturate(1.3);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 4px 24px rgba(0,0,0,0.2);transition:border-color 0.3s,transform 0.3s}
.lg-card:hover{border-color:rgba(255,255,255,0.18);transform:translateY(-2px)}
.lg-card-a{background:linear-gradient(160deg,rgba(239,159,39,0.1),rgba(29,158,117,0.05),rgba(255,255,255,0.03));backdrop-filter:blur(30px) saturate(1.4);-webkit-backdrop-filter:blur(30px) saturate(1.4);border:1px solid rgba(239,159,39,0.18);border-radius:16px;padding:24px;box-shadow:inset 0 1px 0 rgba(239,159,39,0.1),0 4px 24px rgba(0,0,0,0.2);transition:border-color 0.3s,transform 0.3s}
.lg-card-a:hover{border-color:rgba(239,159,39,0.3);transform:translateY(-2px)}

.stat-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(239,159,39,0.2);background:linear-gradient(135deg,rgba(29,158,117,0.06),rgba(239,159,39,0.04));box-shadow:0 0 30px rgba(239,159,39,0.06);transition:box-shadow 0.3s}
.stat-ring:hover{box-shadow:0 0 40px rgba(239,159,39,0.12)}
.grad-btn{background:linear-gradient(135deg,var(--amber),var(--amber-d));border:none;color:var(--bg);font-family:inherit;font-weight:500;font-size:14px;padding:14px 32px;border-radius:12px;box-shadow:0 4px 20px rgba(239,159,39,0.3);cursor:pointer;text-decoration:none;display:inline-block;transition:transform 0.2s,box-shadow 0.2s}

.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.cards-grid{grid-template-columns:1fr}}

<script src="https://cdn.jsdelivr.net/npm/d3-array@3/dist/d3-array.min.js"></script>

<script>
(function(){

var cv = document.getElementById('map');
var ctx = cv.getContext('2d');
var DPR = window.devicePixelRatio || 2;
var W, H, proj, pathGen;

function resize() {
  W = cv.offsetWidth;
  H = cv.offsetHeight;
  cv.width = W * DPR;
  cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  proj = d3.geoMercator()
    .center([148, -29])
    .scale(Math.min(W, H) * 1.15)
    .translate([W * 0.4, H * 0.46]);
  pathGen = d3.geoPath(proj, ctx);
}
resize();

var landGeo = null;
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
  .then(function(r) { return r.json(); })
  .then(function(topo) {
    landGeo = topojson.feature(topo, topo.objects.countries);
  })
  .catch(function() {
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(function(r) { return r.json(); })
      .then(function(topo) {
        landGeo = topojson.feature(topo, topo.objects.countries);
      }).catch(function() {});
  });

// Airports shown on map
var airports = {
  SYD: { lat: -33.95, lon: 151.18, main: true },
  MEL: { lat: -37.67, lon: 144.84 },
  BNE: { lat: -27.38, lon: 153.12 },
  ADL: { lat: -34.94, lon: 138.53 },
  PER: { lat: -31.94, lon: 115.97 },
  AKL: { lat: -37.01, lon: 174.79 },
  WLG: { lat: -41.33, lon: 174.81 },
  CHC: { lat: -43.49, lon: 172.53 },
  NOU: { lat: -22.01, lon: 166.22 },
  HBA: { lat: -42.84, lon: 147.51 },
  CNS: { lat: -16.88, lon: 145.76 },
  DRW: { lat: -12.41, lon: 130.87 }
};

// Extended airport DB for route lines (not drawn on map)
var airportDB = Object.assign({}, airports, {
  // Australia
  CBR:{lat:-35.31,lon:149.19}, OOL:{lat:-28.16,lon:153.50}, TSV:{lat:-19.25,lon:146.77},
  ASP:{lat:-23.81,lon:133.90}, KTA:{lat:-20.71,lon:116.77}, BME:{lat:-17.95,lon:122.23},
  LST:{lat:-41.55,lon:147.21}, MCY:{lat:-26.60,lon:153.09}, HTI:{lat:-20.36,lon:148.95},
  AVV:{lat:-38.04,lon:144.47}, NTL:{lat:-32.79,lon:151.83}, PPP:{lat:-20.49,lon:148.55},
  // New Zealand
  ZQN:{lat:-45.02,lon:168.74}, DUD:{lat:-45.93,lon:170.20}, ROT:{lat:-38.11,lon:176.32},
  NPE:{lat:-39.47,lon:176.87}, NPL:{lat:-39.01,lon:174.18}, PMR:{lat:-40.32,lon:175.62},
  NSN:{lat:-41.30,lon:173.22}, BHE:{lat:-41.52,lon:173.87}, IVC:{lat:-46.41,lon:168.31},
  TRG:{lat:-37.67,lon:176.20}, HLZ:{lat:-37.87,lon:175.33}, GIS:{lat:-38.66,lon:177.98},
  // SE Asia
  SIN:{lat:1.36,lon:103.99}, KUL:{lat:2.74,lon:101.70}, BKK:{lat:13.68,lon:100.75},
  CGK:{lat:-6.13,lon:106.66}, DPS:{lat:-8.75,lon:115.17}, MNL:{lat:14.51,lon:121.02},
  SGN:{lat:10.82,lon:106.65}, HAN:{lat:21.22,lon:105.81}, RGN:{lat:16.91,lon:96.13},
  PNH:{lat:11.55,lon:104.84}, SUB:{lat:-7.38,lon:112.79},
  // East Asia
  HKG:{lat:22.31,lon:113.91}, PVG:{lat:31.14,lon:121.81}, PEK:{lat:40.08,lon:116.58},
  NRT:{lat:35.76,lon:140.39}, HND:{lat:35.55,lon:139.78}, ICN:{lat:37.46,lon:126.44},
  TPE:{lat:25.08,lon:121.23}, CAN:{lat:23.39,lon:113.30}, KIX:{lat:34.43,lon:135.24},
  // South Asia / Middle East
  DEL:{lat:28.57,lon:77.10}, BOM:{lat:19.09,lon:72.87}, CMB:{lat:7.18,lon:79.88},
  DOH:{lat:25.26,lon:51.57}, DXB:{lat:25.25,lon:55.36}, AUH:{lat:24.43,lon:54.65},
  JED:{lat:21.68,lon:39.16}, RUH:{lat:24.96,lon:46.70},
  // Pacific
  NAN:{lat:-17.76,lon:177.44}, SUV:{lat:-18.04,lon:177.44}, PPT:{lat:-17.56,lon:-149.61},
  APW:{lat:-13.83,lon:-171.99}, TBU:{lat:-21.24,lon:-175.15}, VLI:{lat:-17.70,lon:168.32},
  HIR:{lat:-9.43,lon:160.05}, POM:{lat:-6.01,lon:147.01}, RUN:{lat:-20.89,lon:55.51},
  // Americas
  LAX:{lat:33.94,lon:-118.41}, SFO:{lat:37.62,lon:-122.38}, DFW:{lat:32.90,lon:-97.04},
  JFK:{lat:40.64,lon:-73.78}, YVR:{lat:49.19,lon:-123.18}, SCL:{lat:-33.39,lon:-70.79},
  EZE:{lat:-34.82,lon:-58.54}, GRU:{lat:-23.43,lon:-46.47}, IAH:{lat:29.98,lon:-95.34},
  // Europe
  LHR:{lat:51.47,lon:-0.46}, CDG:{lat:49.01,lon:2.55}, FRA:{lat:50.03,lon:8.57},
  AMS:{lat:52.31,lon:4.77}, FCO:{lat:41.80,lon:12.25}, MAD:{lat:40.47,lon:-3.57},
  IST:{lat:41.26,lon:28.74}, ATH:{lat:37.94,lon:23.94}, ZRH:{lat:47.46,lon:8.55},
  // Africa
  JNB:{lat:-26.14,lon:28.25}, CPT:{lat:-33.96,lon:18.60}, NBO:{lat:-1.32,lon:36.93},
  CAI:{lat:30.12,lon:31.41}, ADD:{lat:8.98,lon:38.80}, MRU:{lat:-20.43,lon:57.68}
});

function toXY(lon, lat) {
  var p = proj([lon, lat]);
  return p ? p : [0, 0];
}

// ============================================================
// FLIGHT TRACKER — real data only, dead-reckoning between polls
// ============================================================
//
// OpenSky state vector fields:
//   [0] icao24        [5] longitude     [9]  velocity (m/s ground speed)
//   [1] callsign      [6] latitude      [10] true_track (degrees clockwise from north)
//   [7] baro_altitude  [8] on_ground
//
// Between API polls each aircraft's rendered position is advanced
// every animation frame using its ground speed and true_track heading.
// When a new poll arrives the position snaps to the fresh API data.

var R_EARTH = 6371000; // metres

// Advance a lat/lon by distance d (metres) along heading h (degrees CW from north)
function moveLatLon(lat, lon, hdgDeg, distMetres) {
  var d = distMetres / R_EARTH;
  var h = hdgDeg * Math.PI / 180;
  var lat1 = lat * Math.PI / 180;
  var lon1 = lon * Math.PI / 180;
  var sinLat1 = Math.sin(lat1);
  var cosLat1 = Math.cos(lat1);
  var sinD = Math.sin(d);
  var cosD = Math.cos(d);
  var lat2 = Math.asin(sinLat1 * cosD + cosLat1 * sinD * Math.cos(h));
  var lon2 = lon1 + Math.atan2(Math.sin(h) * sinD * cosLat1, cosD - sinLat1 * Math.sin(lat2));
  return { lat: lat2 * 180 / Math.PI, lon: lon2 * 180 / Math.PI };
}

// All tracked aircraft. Key = icao24 hex.
// Each: { lat, lon, hdg, vel, alt, callsign, staleFrames }
var planes = {};
var visibleCount = 0;
var pollOk = false;
var pollError = false;

// ============================================================
// DATA SOURCE: Flightradar24 via JSONP (bypasses CORS entirely)
// Works from file://, localhost, or any hosted domain.
// Bounds: north_lat, south_lat, west_lon, east_lon
// ============================================================

var FR24_BOUNDS = '-10,-50,105,185'; // SE Australia + NZ + Pacific
var POLL_MS = 3000;
var lastPollTime = 0;

function loadFlights() {
  var qs = 'bounds=' + FR24_BOUNDS
    + '&faa=1&satellite=1&mlat=1&adsb=1&gnd=0&air=1'
    + '&vehicles=0&estimated=0&maxage=14400&gliders=0&stats=0';

  fetch('/fr24?' + qs)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) { ingestFR24(data); })
    .catch(function(err) {
      pollError = true;
      console.warn('FR24:', err.message);
    });
}

function ingestFR24(data) {
  pollOk = true;
  pollError = false;
  var now = Date.now();
  var seen = {};

  var keys = Object.keys(data);
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    if (key === 'full_count' || key === 'version' || key === 'stats') continue;
    var f = data[key];
    if (!Array.isArray(f) || f.length < 15) continue;

    // FR24 format: [icao, lat, lon, heading, alt_ft, speed_kts, squawk,
    //   radar, type, reg, timestamp, origin, dest, flight, on_ground, vspeed, callsign, ?, airline]
    var lat = f[1];
    var lon = f[2];
    var hdg = f[3];
    var altFt = f[4];
    var spdKts = f[5];
    var onGround = f[14];

    if (lat == null || lon == null || hdg == null) continue;
    if (onGround === 1) continue;
    var altM = (typeof altFt === 'number') ? altFt * 0.3048 : 10000;
    if (altM < 300) continue;
    if (altM < 2500 && isNearAirport(lat, lon)) continue;

    seen[key] = true;
    var existing = planes[key];
    var trail = existing ? existing.trail : [];
    // Record position for trail (keep last 60 points ~3 min at 3s polls)
    trail.push([lat, lon]);
    if (trail.length > 60) trail.shift();

    planes[key] = {
      lat: lat, lon: lon, hdg: hdg,
      vel: (spdKts != null && spdKts > 0) ? spdKts * 0.5144 : 220,
      alt: altM, altFt: altFt, spdKts: spdKts || 0,
      type: (f[8] || '').toUpperCase(),
      callsign: (f[16] || f[13] || '').trim(),
      flight: (f[13] || '').trim(),
      reg: (f[9] || '').trim(),
      from: (f[11] || '').trim(),
      to: (f[12] || '').trim(),
      airline: (f[18] || '').trim(),
      lastSeen: now,
      trail: trail
    };
  }

  // Prune aircraft gone for over 30s (missed ~4 polls)
  var pkeys = Object.keys(planes);
  for (var k = 0; k < pkeys.length; k++) {
    if (now - planes[pkeys[k]].lastSeen > 30000) {
      delete planes[pkeys[k]];
    }
  }
}

// Initial load + polling
loadFlights();

function pollFlights() {
  var now = Date.now();
  if (now - lastPollTime < POLL_MS) return;
  lastPollTime = now;
  loadFlights();
}

// ============================================================
// DRAWING
// ============================================================

// Draw a plane icon pointing in hdgDeg direction (CW from north)
// On a standard screen-space canvas where +x=right, +y=down:
//   North (0°) = pointing up = -PI/2 in canvas radians
//   The plane shape points right (east) at rotation=0,
//   so we rotate by (hdg - 90) degrees.
// Check if aircraft is near any airport (~25km radius)
function isNearAirport(lat, lon) {
  var codes = Object.keys(airports);
  for (var i = 0; i < codes.length; i++) {
    var ap = airports[codes[i]];
    var dLat = lat - ap.lat;
    var dLon = lon - ap.lon;
    if (Math.abs(dLat) < 0.25 && Math.abs(dLon) < 0.25) return true;
  }
  return false;
}

// Classify aircraft size from altitude + speed
// Returns: 'heavy' (A380/747/A340-size), 'large' (A330/777/767), 'medium' (A320/737)
// Aircraft silhouettes from tar1090 (open-source ADS-B tracker, MIT license)
// heavy_4e and heavy_2e on 64x64 grid, jet_swept on 18x24 grid

function getShapeInfo(acType, alt, vel) {
  if (HELI_TYPES[acType]) return { shape: 'heli', size: 16 };
  if (SINGLE_PROP_TYPES[acType]) return { shape: 'turboprop', size: 12 };
  if (TWIN_PROP_TYPES[acType]) return { shape: 'twinprop', size: 14 };
  if (QUAD_TYPES[acType]) return { shape: 'quad', size: 24 };
  if (WIDEBODY_TYPES[acType]) return { shape: 'heavy', size: 22 };
  if (NARROWBODY_TYPES[acType]) return { shape: 'heavy', size: 16 };
  // Fallback by altitude/speed for unknown types
  if (alt > 11000 && vel > 240) return { shape: 'heavy', size: 20 };
  if (alt > 9000 && vel > 220) return { shape: 'heavy', size: 16 };
  return { shape: 'large', size: 14 };
}

function drawPlane(x, y, hdgDeg, acType, alt, vel) {
  var ang = hdgDeg * Math.PI / 180;
  var info = getShapeInfo(acType, alt, vel);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang);
  ctx.fillStyle = '#EF9F27';

  if (info.shape === 'heli') {
    var sc = info.size / 64;
    ctx.scale(sc, sc);
    ctx.translate(-32, -38);
    ctx.fill(planeShapes.heli);
  } else if (info.shape === 'turboprop') {
    // single_turbo: ~19x18 grid, center ~(9.5, 9)
    var sc = info.size / 19;
    ctx.scale(sc, sc);
    ctx.translate(-9.5, -9);
    ctx.fill(planeShapes.turboprop);
  } else if (info.shape === 'twinprop') {
    // twin_small: ~19x16 grid, center ~(9.5, 8)
    var sc = info.size / 19;
    ctx.scale(sc, sc);
    ctx.translate(-9.5, -8);
    ctx.fill(planeShapes.twinprop);
  } else if (info.shape === 'quad' || info.shape === 'heavy') {
    // heavy_4e / heavy_2e: 64x64 grid, center ~(32,30)
    var sc = info.size / 64;
    ctx.scale(sc, sc);
    ctx.translate(-32, -30);
    ctx.fill(planeShapes[info.shape]);
  } else {
    // jet_swept: 18x24 grid, center ~(9,12)
    var sc = info.size / 18;
    ctx.scale(sc, sc);
    ctx.translate(-9, -12);
    ctx.fill(planeShapes.large);
  }

  ctx.restore();
}

function drawGrid() {
  ctx.lineWidth = 0.5;
  for (var lon = 110; lon <= 180; lon += 5) {
    ctx.beginPath();
    ctx.strokeStyle = (lon % 10 === 0) ? 'rgba(29,158,117,0.10)' : 'rgba(29,158,117,0.05)';
    for (var la = -50; la <= -5; la += 0.5) {
      var p = toXY(lon, la);
      la === -50 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]);
    }
    ctx.stroke();
  }
  for (var lat = -10; lat >= -50; lat -= 5) {
    ctx.beginPath();
    ctx.strokeStyle = (lat % 10 === 0) ? 'rgba(29,158,117,0.10)' : 'rgba(29,158,117,0.05)';
    for (var lo = 105; lo <= 185; lo += 0.5) {
      var p2 = toXY(lo, lat);
      lo === 105 ? ctx.moveTo(p2[0], p2[1]) : ctx.lineTo(p2[0], p2[1]);
    }
    ctx.stroke();
  }
}

function drawLand() {
  if (!landGeo) return;
  ctx.beginPath();
  pathGen(landGeo);
  ctx.fillStyle = 'rgba(29,158,117,0.07)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(29,158,117,0.35)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

function drawAirports() {
  var codes = Object.keys(airports);
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var ap = airports[code];
    var p = toXY(ap.lon, ap.lat);
    if (p[0] < -50 || p[0] > W + 50 || p[1] < -50 || p[1] > H + 50) continue;
    if (ap.main) {
      ctx.beginPath(); ctx.arc(p[0], p[1], 18, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(239,159,39,0.05)'; ctx.fill();
      ctx.beginPath(); ctx.arc(p[0], p[1], 9, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(239,159,39,0.1)'; ctx.fill();
      ctx.beginPath(); ctx.arc(p[0], p[1], 4, 0, Math.PI * 2);
      ctx.fillStyle = '#EF9F27'; ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(p[0], p[1], 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(29,158,117,0.5)'; ctx.fill();
    }
    ctx.font = '500 9px "DM Sans",-apple-system,sans-serif';
    ctx.fillStyle = ap.main ? 'rgba(239,159,39,0.6)' : 'rgba(192,192,192,0.3)';
    ctx.textAlign = 'center';
    ctx.fillText(code, p[0], p[1] - 12);
  }
}

var mouseX = -1, mouseY = -1;
var hoveredKey = null;
var tip = document.getElementById('flight-tip');

var hero = document.getElementById('hero');
hero.addEventListener('mousemove', function(e) {
  var rect = cv.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});
hero.addEventListener('mouseleave', function() {
  mouseX = mouseY = -1;
  hoveredKey = null;
  tip.style.display = 'none';
});

function findHoveredPlane() {
  if (mouseX < 0) { hoveredKey = null; return; }
  var best = null, bestDist = 20; // 20px hit radius
  var keys = Object.keys(planes);
  for (var i = 0; i < keys.length; i++) {
    var ac = planes[keys[i]];
    var p = toXY(ac.lon, ac.lat);
    var dx = p[0] - mouseX, dy = p[1] - mouseY;
    var d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestDist) { bestDist = d; best = keys[i]; }
  }
  hoveredKey = best;
}

function updateTooltip() {
  if (!hoveredKey || !planes[hoveredKey]) {
    tip.style.display = 'none';
    return;
  }
  var ac = planes[hoveredKey];
  var route = '';
  if (ac.from || ac.to) {
    route = '<div class="tip-route">' + (ac.from || '???') + ' \u2708 ' + (ac.to || '???') + '</div>';
  }
  tip.innerHTML =
    '<div class="tip-call">' + (ac.flight || ac.callsign || hoveredKey) + '</div>' +
    route +
    (ac.reg ? '<div style="font-size:10px;color:var(--txt3);margin-bottom:8px">' + ac.type + ' \u00B7 ' + ac.reg + '</div>' : '') +
    '<div class="tip-row"><span class="tip-label">Altitude</span><span class="tip-val">' + (ac.altFt ? ac.altFt.toLocaleString() + ' ft' : 'N/A') + '</span></div>' +
    '<div class="tip-row"><span class="tip-label">Speed</span><span class="tip-val">' + Math.round(ac.spdKts) + ' kts</span></div>' +
    '<div class="tip-row"><span class="tip-label">Heading</span><span class="tip-val">' + Math.round(ac.hdg) + '\u00B0</span></div>';

  tip.style.display = 'block';
  // Position tooltip near mouse but keep on screen
  var tx = mouseX + 20, ty = mouseY - 20;
  var hRect = hero.getBoundingClientRect();
  if (tx + 200 > hRect.width) tx = mouseX - 210;
  if (ty < 10) ty = 10;
  if (ty + 160 > hRect.height) ty = hRect.height - 170;
  tip.style.left = tx + 'px';
  tip.style.top = ty + 'px';
}

// Interpolate N points along a great circle between two lat/lon pairs
function greatCirclePoints(lat1, lon1, lat2, lon2, n) {
  var toRad = Math.PI / 180, toDeg = 180 / Math.PI;
  var la1 = lat1 * toRad, lo1 = lon1 * toRad;
  var la2 = lat2 * toRad, lo2 = lon2 * toRad;
  var d = 2 * Math.asin(Math.sqrt(
    Math.pow(Math.sin((la1 - la2) / 2), 2) +
    Math.cos(la1) * Math.cos(la2) * Math.pow(Math.sin((lo1 - lo2) / 2), 2)
  ));
  if (d < 0.0001) return [[lat1, lon1], [lat2, lon2]];
  var pts = [];
  for (var i = 0; i <= n; i++) {
    var f = i / n;
    var A = Math.sin((1 - f) * d) / Math.sin(d);
    var B = Math.sin(f * d) / Math.sin(d);
    var x = A * Math.cos(la1) * Math.cos(lo1) + B * Math.cos(la2) * Math.cos(lo2);
    var y = A * Math.cos(la1) * Math.sin(lo1) + B * Math.cos(la2) * Math.sin(lo2);
    var z = A * Math.sin(la1) + B * Math.sin(la2);
    pts.push([Math.atan2(z, Math.sqrt(x * x + y * y)) * toDeg, Math.atan2(y, x) * toDeg]);
  }
  return pts;
}

function drawTrail(ac) {
  var fromAp = ac.from ? airportDB[ac.from] : null;
  var toAp = ac.to ? airportDB[ac.to] : null;

  // Draw full route as great circle arc
  if (fromAp && toAp) {
    // Origin → current position (solid, brighter)
    var seg1 = greatCirclePoints(fromAp.lat, fromAp.lon, ac.lat, ac.lon, 40);
    ctx.beginPath();
    ctx.lineWidth = 1.8;
    ctx.strokeStyle = 'rgba(239,159,39,0.35)';
    for (var i = 0; i < seg1.length; i++) {
      var p = toXY(seg1[i][1], seg1[i][0]);
      i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]);
    }
    ctx.stroke();

    // Current position → destination (dashed, dimmer)
    var seg2 = greatCirclePoints(ac.lat, ac.lon, toAp.lat, toAp.lon, 40);
    ctx.beginPath();
    ctx.setLineDash([6, 8]);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(239,159,39,0.2)';
    for (var i = 0; i < seg2.length; i++) {
      var p = toXY(seg2[i][1], seg2[i][0]);
      i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw origin/destination dots
    var pFrom = toXY(fromAp.lon, fromAp.lat);
    var pTo = toXY(toAp.lon, toAp.lat);
    ctx.beginPath(); ctx.arc(pFrom[0], pFrom[1], 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(29,158,117,0.7)'; ctx.fill();
    ctx.beginPath(); ctx.arc(pTo[0], pTo[1], 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(239,159,39,0.7)'; ctx.fill();

    // Labels
    ctx.font = '600 10px "DM Sans",-apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(29,158,117,0.8)';
    ctx.fillText(ac.from, pFrom[0], pFrom[1] - 8);
    ctx.fillStyle = 'rgba(239,159,39,0.8)';
    ctx.fillText(ac.to, pTo[0], pTo[1] - 8);
  } else {
    // No route data — draw position trail + projected heading
    if (ac.trail && ac.trail.length >= 2) {
      var len = ac.trail.length;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      for (var i = 1; i < len; i++) {
        var p0 = toXY(ac.trail[i - 1][1], ac.trail[i - 1][0]);
        var p1 = toXY(ac.trail[i][1], ac.trail[i][0]);
        var alpha = (i / len) * 0.6;
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(239,159,39,' + alpha.toFixed(2) + ')';
        ctx.moveTo(p0[0], p0[1]);
        ctx.lineTo(p1[0], p1[1]);
        ctx.stroke();
      }
    }
    // Projected heading
    var last = toXY(ac.lon, ac.lat);
    var fwd = moveLatLon(ac.lat, ac.lon, ac.hdg, ac.vel * 120);
    var pFwd = toXY(fwd.lon, fwd.lat);
    ctx.beginPath();
    ctx.setLineDash([4, 6]);
    ctx.strokeStyle = 'rgba(239,159,39,0.3)';
    ctx.lineWidth = 1.5;
    ctx.moveTo(last[0], last[1]);
    ctx.lineTo(pFwd[0], pFwd[1]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================

var prevTime = performance.now();

function frame(now) {
  var dt = Math.min((now - prevTime) / 1000, 0.5);
  prevTime = now;

  pollFlights();
  findHoveredPlane();

  // Dead-reckon all planes
  var keys = Object.keys(planes);
  visibleCount = 0;
  for (var i = 0; i < keys.length; i++) {
    var ac = planes[keys[i]];
    if (ac.vel > 0 && ac.hdg !== null) {
      var dist = ac.vel * dt;
      var np = moveLatLon(ac.lat, ac.lon, ac.hdg, dist);
      ac.lat = np.lat;
      ac.lon = np.lon;
    }
  }

  // Clear and draw background
  ctx.clearRect(0, 0, W, H);
  try { drawGrid(); } catch(e) {}
  try { drawLand(); } catch(e) {}
  try { drawAirports(); } catch(e) {}

  // Draw trail for hovered plane (behind all planes)
  if (hoveredKey && planes[hoveredKey]) {
    try { drawTrail(planes[hoveredKey]); } catch(e) {}
  }

  // Draw planes
  for (var j = 0; j < keys.length; j++) {
    try {
      var ac2 = planes[keys[j]];
      var p = toXY(ac2.lon, ac2.lat);
      if (p[0] < -30 || p[0] > W + 30 || p[1] < -30 || p[1] > H + 30) continue;
      visibleCount++;
      var isHovered = (keys[j] === hoveredKey);
      ctx.globalAlpha = isHovered ? 1.0 : 0.85;
      drawPlane(p[0], p[1], ac2.hdg, ac2.type, ac2.alt, ac2.vel);
      if (isHovered) {
        // Highlight ring around hovered plane
        ctx.beginPath();
        ctx.arc(p[0], p[1], 14, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(239,159,39,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } catch(e) { ctx.globalAlpha = 1; }
  }

  // Tooltip
  updateTooltip();

  // Status
  var el = document.getElementById('flight-status');
  if (pollOk) {
    el.textContent = visibleCount + ' live aircraft \u00B7 Flightradar24';
    el.style.color = 'rgba(29,158,117,0.6)';
  } else if (pollError) {
    el.textContent = 'Retrying flight data\u2026';
    el.style.color = 'rgba(239,159,39,0.4)';
  } else {
    el.textContent = 'Connecting to flight data\u2026';
    el.style.color = 'rgba(232,232,232,0.3)';
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
window.addEventListener('resize', resize);

})();
</script>
